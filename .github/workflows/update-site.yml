name: Gemini Update

on:
  issues:
    types: [opened]

jobs:
  update:
    if: contains(github.event.issue.title, '[UPDATE]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-genai

      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python3 update.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add index.html
          git diff --staged --quiet || git commit -m "update"
          git push
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,state:"closed"})
